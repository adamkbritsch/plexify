# Plexify — self-host stack. Two services share ONE image (identical code): `plexify` is the
# organizer + web UI; `plexify-downloader` is the autonomous downloader daemon. There are two
# ways to run it — SAME code, the only difference is where the engine lives:
#
#   • SINGLE-HOST ("all on the NAS")  — engine + downloader on one machine:
#       cp .env.example .env   # set MUSIC_DIR / DOWNLOADS_DIR / PUBLIC_BASE_URL
#       docker compose up -d --build
#       open http://localhost:8787  → setup wizard (Spotify + Plex + Agreement)
#
#   • SPLIT ("half on a Mac")  — downloader stays on the NAS, engine + UI move to a Mac:
#       on the NAS:  docker compose up -d --build plexify-downloader   # daemon only
#       on the Mac:  run the native app (macapp/, see docs/MACOS.md), OR
#                    docker compose up -d --build plexify  with NAS_DOWNLOADER_HOSTS=http://<nas-ip>:8788
#     Nothing else changes — the engine always talks to the daemon over HTTP; the split just
#     puts the daemon on the storage host and the engine on the Mac.

services:
  plexify:
    build: ./engine-run
    image: plexify:local
    container_name: plexify
    restart: unless-stopped
    ports:
      - "${ENGINE_PORT:-8787}:8787"
    environment:
      - DATA_DIR=/data
      # Set this to the URL you'll actually reach the UI at — it builds the Spotify OAuth
      # redirect, so localhost only works when you set up from the same machine.
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8787}
      - NAS_DOWNLOADER_HOSTS=http://plexify-downloader:8788
      - DOWNLOADER_TOKEN=${DOWNLOADER_TOKEN:-}
    volumes:
      # Named volume, NOT a host bind mount, on purpose: a fresh `docker compose up`
      # would create ./data as root:root, which the image's USER 1000:10 cannot write —
      # crash-looping the container. A named volume inherits the image's 1000:10
      # ownership. To use a host path instead, replace with `- /your/path:/data` and
      # run `chown -R 1000:10 /your/path` first.
      - plexify-data:/data
      # MUSIC_DIR / DOWNLOADS_DIR are your existing folders — they must be writable by
      # uid 1000 / gid 10 (the container's user). On most NAS/Plex setups they already are.
      - ${MUSIC_DIR:?set MUSIC_DIR in .env — your Plex music library folder}:/music
      - ${DOWNLOADS_DIR:?set DOWNLOADS_DIR in .env — a working/download folder}:/downloads

  plexify-downloader:
    image: plexify:local
    build: ./engine-run
    container_name: plexify-downloader
    restart: unless-stopped
    command: ["python", "downloader_daemon.py"]
    # No depends_on: the daemon is autonomous and runs standalone in the split (NAS-only) mode.
    ports:
      - "${DOWNLOADER_PORT:-8788}:8788"
    environment:
      - DATA_DIR=/data                    # the daemon's OWN tiny config DB (never plexify.db)
      - DOWNLOADER_TOKEN=${DOWNLOADER_TOKEN:-}
      - DOWNLOADER_PORT=8788
    # The image's baked HEALTHCHECK probes 8787 (the engine's port); this daemon listens
    # on 8788, so override it to hit the daemon's own /healthz — otherwise the container
    # is permanently marked "unhealthy".
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      # Named volume for the same root:root reason as the engine's /data (see above).
      - plexify-downloader-data:/data
      - ${DOWNLOADS_DIR:?set DOWNLOADS_DIR in .env}:/downloads
      # Audiobooks (optional — pairs with the auto-m4b service below): the final library
      # folder your Plex audiobook library indexes. The organizer tags books NEAR STORAGE
      # in this daemon, then files them here. Harmless when unused.
      - ${AUDIOBOOKS_DIR:-./audiobooks}:/audiobooks
    # environment already above; the audiobook organizer additionally honors:
    #   AUDIOBOOKS_TEMP_DIR    (default /downloads/audiobooks/auto-m4b — auto-m4b's /temp)
    #   AUDIOBOOKS_LIBRARY_DIR (default /audiobooks)

  # ── Optional sources — uncomment to run them alongside Plexify ──────────────────────
  # auto-m4b:                    # audiobook mp3 -> chapterized m4b converter (Plexify's
  #   image: seanap/auto-m4b     # organizer then tags + files the output; maintained
  #   container_name: plexify-auto-m4b        # drop-in fork: philiptn/auto-m4b)
  #   restart: unless-stopped
  #   environment: ["PUID=1000", "PGID=10", "CPU_CORES=2", "SLEEPTIME=1m", "MAKE_BACKUP=Y"]
  #   volumes:
  #     - ./auto-m4b-config:/config
  #     - ${DOWNLOADS_DIR}/audiobooks/auto-m4b:/temp
  #   # drop books into ${DOWNLOADS_DIR}/audiobooks/auto-m4b/recentlyadded — see docs/AUDIOBOOKS.md
  #
  # slskd:                       # Soulseek (free peer-to-peer FLAC source)
  #   image: slskd/slskd:latest
  #   container_name: slskd
  #   restart: unless-stopped
  #   ports: ["5030:5030"]
  #   environment: ["SLSKD_REMOTE_CONFIGURATION=true"]
  #   volumes: ["./slskd:/app", "${DOWNLOADS_DIR}:/downloads"]
  #   # then in the wizard set slskd URL = http://slskd:5030
  #
  # lidarr:                      # optional album organizer / quality upgrades
  #   image: lscr.io/linuxserver/lidarr:latest
  #   container_name: plexify-lidarr
  #   restart: unless-stopped
  #   ports: ["8686:8686"]
  #   environment: ["PUID=1000", "PGID=10", "TZ=Etc/UTC"]
  #   volumes: ["./lidarr-config:/config", "${MUSIC_DIR}:/music", "${DOWNLOADS_DIR}:/downloads"]
  #   # then in the wizard set Lidarr URL = http://plexify-lidarr:8686

# Named volumes hold each service's small config DB (plexify.db / the daemon's queue).
# They come up owned by the image's uid 1000 / gid 10 so the non-root container can write
# them; a plain `./data` host bind mount would be root-owned and crash on first run.
volumes:
  plexify-data:
  plexify-downloader-data:
